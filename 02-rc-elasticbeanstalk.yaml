                          update redcap_user_information set account_manager = 1, access_system_config = 1, access_system_upgrade = 1,
                            access_external_module_install = 1, admin_rights = 1, access_admin_dashboards = 1 where super_user = 1;''',
                                          '00HIPAA.config': '''commands:
                      00mountencrypted:
                        command: |
                          mount='/var/log/nginx'
                          if grep -qs "$$mount" /proc/mounts; then
                          echo "encrypted volume already mounted ..."
                          else
                          TOKEN=$$(curl -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
                          awszone=$$(curl -s -H "X-aws-ec2-metadata-token: $$TOKEN" http://169.254.169.254/latest/meta-data/placement/availability-zone)
                          awsregion=`echo $$awszone | sed 's/.$//'`
                          device='/dev/sdh'
                          instanceId=$$(curl -s -H "X-aws-ec2-metadata-token: $$TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
                          volumeId=$$(aws ec2 create-volume --size 4 --region $$awsregion --availability-zone $$awszone --volume-type standard --encrypted --query VolumeId --output=text)
                          aws ec2 wait volume-available --region $$awsregion --volume-ids $$volumeId
                          aws ec2 attach-volume --volume-id $$volumeId --instance-id $$instanceId --device $$device --region $$awsregion
                          aws ec2 wait volume-in-use --region $$awsregion --volume-ids $$volumeId
                          aws ec2 modify-instance-attribute --instance-id $$instanceId --block-device-mappings DeviceName=$$device,Ebs={DeleteOnTermination=true} --region $$awsregion
                          while [ `stat $$device 2>/dev/null 1>&2; echo $?` -ne 0 ]; do
                          sleep 1
                          done
                          mkfs -t ext3 $$device
                          mkdir /tmp/mnt
                          cp -a $$mount/* /tmp/mnt
                          mount $$device $$mount
                          cp -a /tmp/mnt/* $$mount
                          fi
                        ignoreErrors: false
                      01SelfSignedSSL:
                        command: |
                          if [ ! -f /etc/pki/tls/certs/server.key ]; then
                          openssl genrsa 2048 > server.key
                          openssl req -new -key server.key -out csr.pem -subj "/C=US/ST=WA/L=Seattle/O=anon/OU=anon/CN=none/emailAddress=none"
                          openssl x509 -req -days 365 -in csr.pem -signkey server.key -out server.crt
                          cp server.crt server.key /etc/pki/tls/certs/
                          rm -f server.crt server.key csr.pem
                          systemctl restart nginx
                          else
                          echo "Already have a self-signed private key. This must be an application redeployment"
                          fi''',
                                          '99redcap_config.sh': '''#!/usr/bin/env bash
                          export AWS_DEFAULT_REGION=${AWS::Region}
                          sed -i "/\\$hostname[ tab]\\+/s/=.*/= '${RDSCluster.Endpoint.Address}';/" /var/app/current/redcap/database.php
                          sed -i "/\\$db[ tab]\\+/s/=.*/= 'redcap';/" /var/app/current/redcap/database.php
                          sed -i "/\\$username[ tab]\\+/s/=.*/= 'redcap_user';/" /var/app/current/redcap/database.php
                          sed -i "/\\$password[ tab]\\+/s/=.*/= '${DatabaseMasterPassword}';/" /var/app/current/redcap/database.php
                          if ! aws ssm get-parameter --name redcap_salt; then
                              aws ssm put-parameter --name "redcap_salt" --type "SecureString" --value `head /dev/urandom | tr -dc a-z0-9 | head -c 8 ; echo ''`
                          fi
                          sed -i "s#\\$salt = '';#\\$salt = '`aws ssm get-parameter --name redcap_salt --with-decryption --query 'Parameter.Value' --output text`';#" /var/app/current/redcap/database.php
                          dnf install mariadb105
                          if [ ! -f /eb-configured ]; then
                          systemctl restart nginx
                          systemctl restart php-fpm
                          touch /var/log/eb-activity.log
                          (crontab -l ; echo -e "# REDCap Cron Job (runs every minute)\\n* * * * * /usr/bin/php /var/app/current/redcap/cron.php > /dev/null") | crontab
                          mysql -h ${RDSCluster.Endpoint.Address} -u master -D redcap --password='${DatabaseMasterPassword}' < /create_redcap_user.sql
                          if [ -e /leaderonly ]; then
                            if ! mysql -h ${RDSCluster.Endpoint.Address} -u master -D redcap --password='${DatabaseMasterPassword}' -e "select * from redcap_actions"; then
                                    count=0
                                    while ! [ -s /curl.out ] && [ $count -ne "100" ];
                                    do
                                      (curl -o /curl.out -k -F redcap_csrf_token= -F superusers_only_create_project=0 -F superusers_only_move_to_prod=1 -F auto_report_stats=1 -F bioportal_api_token= -F redcap_base_url='https://localhost/' -F enable_url_shortener=1 -F default_datetime_format='D/M/Y_12' -F default_number_format_decimal=, -F default_number_format_thousands_sep=. -F homepage_contact='REDCap Administrator (123-456-7890)' -F homepage_contact_email=email@yoursite.edu -F project_contact_name='REDCap Administrator (123-456-7890)' -F project_contact_email=email@yoursite.edu -F institution='SoAndSo University' -F site_org_type='SoAndSo Institute for Clinical and Translational Research' -F hook_functions_file='/var/app/current/redcap/hook_functions.php' https://localhost/install.php)
                                      sleep 20
                                      let count+=1
                                    done
                                    sed -ni '/onclick=\\x27this.select();\\x27>/,/<\\/textarea>/p' /curl.out
                                    sed -i -e "1d" /curl.out
                                    temp=`tail -1 /curl.out | cut -d';' -f1`; sed '$$d' /curl.out > /mysql_rc.sql; echo $$temp';' >> /mysql_rc.sql
                                    mysql -h ${RDSCluster.Endpoint.Address} -u master -D redcap --password='${DatabaseMasterPassword}' < /mysql_rc.sql
                                    mysql -h ${RDSCluster.Endpoint.Address} -u master -D redcap --password='${DatabaseMasterPassword}' < /create_initial_user.sql
                            fi
                          fi
                          rm -f /curl.out /mysql.sql /mysql_rc.sql /create_redcap_user.sql /create_initial_user.sql
                          yum install -y php-ldap sendmail-cf
                          echo "max_input_vars = 100000" >> /etc/php.ini
                          sed -i "s/upload_max_filesize = 2M/upload_max_filesize = 32M/" /etc/php.ini
                          sed -i "s/post_max_size = 8M/post_max_size = 32M/" /etc/php.ini
                          if [ "https://" == 'https://' ]; then
                            echo "session.cookie_secure = on" >> /etc/php.ini
                          fi
                          systemctl restart nginx
                          systemctl restart php-fpm
                          sudo postconf -e "relayhost = [email-smtp.${SESRegion}.amazonaws.com]:587" \\
                          "smtp_sasl_auth_enable = yes" \\
                          "smtp_sasl_security_options = noanonymous" \\
                          "smtp_sasl_password_maps = hash:/etc/postfix/sasl_passwd" \\
                          "smtp_use_tls = yes" \\
                          "smtp_tls_security_level = encrypt" \\
                          "smtp_tls_note_starttls_offer = yes"
                          echo "[email-smtp.${SESRegion}.amazonaws.com]:587 ${SESUsername}:${SESPassword}" >> /etc/postfix/sasl_passwd
                          sudo postmap hash:/etc/postfix/sasl_passwd
                          sudo postconf -e 'smtp_tls_CAfile = /etc/ssl/certs/ca-bundle.crt'
                          sudo postfix start
                          sudo postfix reload
                          touch /eb-configured
                          else
                          echo "Already ran EB configuration scripts. This must be an application redeployment"
                          fi''',
                                                'https.conf': '''server {
                              listen       443 ssl;
                              server_name  localhost;
                              
                              ssl_certificate      /etc/pki/tls/certs/server.crt;
                              ssl_certificate_key  /etc/pki/tls/certs/server.key;
                              
                              ssl_session_timeout  5m;
                              
                              ssl_protocols  TLSv1 TLSv1.1 TLSv1.2;
                              ssl_prefer_server_ciphers   on;
                              
                              location / {
                                  proxy_pass  http://localhost:80;
                                  proxy_set_header   Connection "";
                                  proxy_http_version 1.1;
                                  proxy_set_header        Host            $$host;
                                  proxy_set_header        X-Real-IP       $$remote_addr;
                                  proxy_set_header        X-Forwarded-For $$proxy_add_x_forwarded_for;
                                  proxy_set_header        X-Forwarded-Proto https;
                              }
                          }''',
                                                'deny-temp.conf': '''#Elastic Beanstalk Nginx Deny Temp folder Configuration File

                          location ~* /temp/* {
                              deny all;
                          }'''
                                            }
                  
                  # Create new zip with REDCap + configurations
                  output_zip = io.BytesIO()
                  with zipfile.ZipFile(output_zip, 'w', zipfile.ZIP_DEFLATED) as output_zipfile:
                      # Extract and add REDCap files
                      with zipfile.ZipFile(io.BytesIO(redcap_zip_data), 'r') as redcap_zipfile:
                          for file_info in redcap_zipfile.infolist():
                              output_zipfile.writestr(file_info, redcap_zipfile.read(file_info))
                      
                      # Add configuration files
                      for filename, content in config_files.items():
                          if filename.endswith('.config'):
                              output_zipfile.writestr(f'.ebextensions/{filename}', content)
                          elif filename == '99redcap_config.sh':
                              output_zipfile.writestr('.platform/hooks/postdeploy/99redcap_config.sh', content)
                          elif filename in ['https.conf', 'deny-temp.conf']:
                              if filename == 'https.conf':
                                  output_zipfile.writestr('.platform/nginx/conf.d/https.conf', content)
                              else:
                                  output_zipfile.writestr('.platform/nginx/conf.d/elasticbeanstalk/deny-temp.conf', content)
                  
                  # Upload to S3
                  try:
                      s3.create_bucket(Bucket=eb_bucket)
                  except:
                      pass  # Bucket might already exist
                  
                  s3.put_object(Bucket=eb_bucket, Key='redcap-eb.zip', Body=output_zip.getvalue())
                  
                  # Create file repository bucket
                  try:
                      s3.create_bucket(Bucket=s3_file_repo_bucket)
                      s3.put_bucket_encryption(
                          Bucket=s3_file_repo_bucket,
                          ServerSideEncryptionConfiguration={
                              'Rules': [{
                                  'ApplyServerSideEncryptionByDefault': {
                                      'SSEAlgorithm': 'AES256'
                                  }
                              }]
                          }
                      )
                  except:
                      pass  # Bucket might already exist
                  
                  # Get solution stack
                  stacks = eb.list_available_solution_stacks()
                  solution_stack = None
                  for stack in stacks['SolutionStacks']:
                      if f'PHP {php_version}' in stack and 'Linux 2023' in stack:
                          solution_stack = stack
                          break
                  
                  print('Lambda execution completed successfully')
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {'SolutionStack': solution_stack})
                  
              except Exception as e:
                  # Sanitize error message to avoid exposing sensitive data
                  error_msg = str(e)
                  if 'password' in error_msg.lower():
                      error_msg = 'Authentication error occurred'
                  print(f'Error: {error_msg}')
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})
  
  RedcapBundleCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt RedcapBundleLambda.Arn
      
  LambdaWaitCondition:
    Type: "AWS::CloudFormation::WaitCondition"
    DependsOn: "RedcapBundleCustomResource"
    Properties: 
      Handle: 
        Ref: "LambdaWaitHandle"
      Timeout: "15"
      Count: 0
  LambdaWaitHandle:
    Type: "AWS::CloudFormation::WaitConditionHandle"

Outputs:
  PublicAlbDnsName:
    Value: !If [ DeployACM, !GetAtt 'REDCapEnvironmentACM.EndpointURL', !GetAtt 'REDCapEnvironmentNoACM.EndpointURL' ]
